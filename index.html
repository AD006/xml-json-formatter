<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart XML/JSON Formatter</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="toolbar">
    <div class="toolbar-buttons">
        <button class="btn-format" id="formatBtn">Format</button>
        <button class="btn-expand" id="expandBtn">Expand All</button>
        <button class="btn-collapse" id="collapseBtn">Collapse All</button>
        <button class="btn-clear" id="clearBtn">Clear</button>
        <button class="btn-copy" id="copyBtn">Copy</button>
        <button class="btn-upload" id="uploadBtn">Upload</button>
        
        <!-- Slider Toggle Switch -->
        <div class="mode-switch">
            <span id="xmlLabel" class="active">XML</span>
            <label class="switch">
                <input type="checkbox" id="modeToggle">
                <span class="slider"></span>
            </label>
            <span id="jsonLabel">JSON</span>
        </div>
        
        <input type="file" id="fileInput" hidden>
    </div>
    <div class="title">✨ Smart XML/JSON Formatter</div>
</div>

<div class="editor-container">
    <div id="editor">Paste your XML/JSON here...</div>
</div>

<div class="status-bar">
    <span id="status">✅ Ready (Ctrl+Z = Undo, Ctrl+Y = Redo, Ctrl+S = Download, Ctrl+F = Find/Replace)</span>
    <span class="creator">Created By: Ashish Dhiman</span>
</div>

<!-- AI Chat Bot -->
<div class="chat-bot">
    <div class="chat-button" id="chatButton">
        <span>💬</span>
    </div>
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <h4>💬 Jarvis Assistant</h4>
            <button class="close-chat" id="closeChat">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Ask me anything...">
            <button id="sendChat">Send</button>
        </div>
    </div>
</div>

<!-- Scripts - Load in correct order -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.43.3/ace.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.43.3/ext-searchbox.js"></script>
<script src="cache-manager.js"></script>
<script src="xml-formatter.js"></script>
<script src="json-formatter.js"></script>
<script src="ai-bot.js"></script>
<script src="main.js"></script>
</body>
</html>
